version: 2

project_name: drp

before:
  hooks:
    - go mod tidy

builds:
  - id: drp
    main: ./drp
    binary: drp
    ldflags:
      - -s -w
      - -X github.com/DarpanAdhikari/drp-go-cli/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: drp
    builds:
      - drp
    # linux/darwin → .tar.gz, windows → .zip
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "drp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "drp_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: DarpanAdhikari
    name: drp-go-cli
  name_template: "drp {{ .Tag }}"
  draft: false
  prerelease: auto
